<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <title>Search and Cases | Avow</title>
  <meta name="description" content="Search and filter all documented cases." />
  <meta name="theme-color" content="#1CC2BB" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; media-src 'self' https:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" />
  <meta name="referrer" content="no-referrer" />
  <link rel="canonical" href="./search.html" />
  <link rel="manifest" href="pwa/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="cases">
  <div id="splash" aria-hidden="true"><div class="splash-logo"><img src="assets/icons/icon.svg" alt="Avow"></div></div>
  <main class="app" id="main">
    <h1 class="page-title">Cases</h1>
    <p class="page-sub">Search, filter, and explore every documented case</p>

    <div class="search-bar" style="border:none">
      <input class="search-input" id="q" type="text" placeholder="Search name, type, location" aria-label="Search cases" />
      <button class="iconbtn" id="filter-toggle" aria-label="Toggle filters" aria-expanded="false">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4"></path></svg>
      </button>
    </div>
    <div class="filter-panel hide" id="filters"></div>
    <p class="page-sub" id="result-count" aria-live="polite"></p>
    <section class="section"><div class="case-list" id="results" style="padding-left:0;padding-right:0"></div></section>
  </main>

  <script src="assets/js/core.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <script src="assets/js/components.js" defer></script>
  <script src="assets/js/search.js" defer></script>
</body>
</html>
